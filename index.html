<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BodyMassLog">
<meta name="description" content="体重・体組成を記録・分析するアプリ">
<link rel="manifest" href="manifest.json">
<title>BodyMassLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #222230;
    --line: #2a2a3a;
    --line2: #3a3a50;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #7b6ef6;
    --accent2: #a594ff;
    --green: #4ecca3;
    --red: #ff6b8a;
    --yellow: #ffd166;
    --blue: #60b4ff;
    --orange: #ff9f43;
    --r: 12px;
    --r2: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
    color-scheme: dark;
  }

- {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  }

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘Noto Sans JP’, sans-serif;
font-weight: 300;
overflow: hidden;
}

#app {
height: 100dvh;
display: flex;
flex-direction: column;
position: relative;
overflow: hidden;
}

/* –– SCREENS –– */
.screen {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
opacity: 0;
pointer-events: none;
transform: translateY(20px);
transition: opacity .35s cubic-bezier(.4,0,.2,1), transform .35s cubic-bezier(.4,0,.2,1);
overflow: hidden;
}
.screen.active {
opacity: 1;
pointer-events: all;
transform: translateY(0);
}

/* –– TOPBAR –– */
.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 20px 12px;
border-bottom: 1px solid var(–line);
background: rgba(10,10,15,0.95);
backdrop-filter: blur(20px);
flex-shrink: 0;
position: relative;
z-index: 10;
}
.topbar-logo {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 20px;
letter-spacing: -0.5px;
background: linear-gradient(135deg, var(–accent2), var(–green));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.topbar-subtitle {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–text3);
margin-top: 1px;
letter-spacing: 1px;
}
.icon-btn {
width: 38px;
height: 38px;
border-radius: 10px;
background: var(–bg3);
border: 1px solid var(–line);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all .2s;
flex-shrink: 0;
}
.icon-btn:hover { background: var(–bg4); border-color: var(–line2); }
.icon-btn svg { width: 18px; height: 18px; color: var(–text2); }

/* –– CONTENT –– */
.content {
flex: 1;
overflow-y: auto;
padding: 20px;
scroll-behavior: smooth;
}
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(–line2); border-radius: 99px; }

/* –– CARDS –– */
.card {
background: var(–bg2);
border: 1px solid var(–line);
border-radius: var(–r);
padding: 20px;
margin-bottom: 12px;
}
.card-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–text3);
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 14px;
}

/* –– FORM –– */
.field-group { margin-bottom: 16px; }
.field-label {
font-size: 12px;
color: var(–text2);
margin-bottom: 6px;
display: flex;
align-items: center;
gap: 6px;
}
.field-unit {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–text3);
}
.input {
width: 100%;
background: var(–bg3);
border: 1px solid var(–line);
border-radius: var(–r2);
padding: 12px 14px;
color: var(–text);
font-size: 16px;
font-family: ‘DM Mono’, monospace;
transition: border-color .2s, box-shadow .2s;
outline: none;
appearance: none;
-webkit-appearance: none;
color-scheme: dark;
}
.input:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(123,110,246,0.15);
}
.input::placeholder { color: var(–text3); }
select.input { padding: 11px 14px; }

.settings-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}
.settings-grid .field-group { margin-bottom: 0; }

/* –– TOGGLE –– */
.toggle-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 0;
border-bottom: 1px solid var(–line);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-label {
display: flex;
flex-direction: column;
gap: 2px;
}
.toggle-name { font-size: 14px; color: var(–text); }
.toggle-desc { font-size: 11px; color: var(–text3); }
.toggle {
width: 44px;
height: 26px;
background: var(–bg4);
border-radius: 99px;
position: relative;
cursor: pointer;
transition: background .25s;
flex-shrink: 0;
border: 1px solid var(–line2);
}
.toggle.on { background: var(–accent); border-color: var(–accent); }
.toggle::after {
content: ‘’;
position: absolute;
width: 20px;
height: 20px;
border-radius: 50%;
background: #fff;
top: 2px;
left: 2px;
transition: transform .25s cubic-bezier(.4,0,.2,1);
box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.toggle.on::after { transform: translateX(18px); }

/* –– BUTTONS –– */
.btn {
width: 100%;
padding: 15px;
border-radius: var(–r2);
border: none;
font-family: ‘Syne’, sans-serif;
font-size: 15px;
font-weight: 600;
cursor: pointer;
transition: all .2s;
letter-spacing: 0.5px;
}
.btn-primary {
background: linear-gradient(135deg, var(–accent), #6056d4);
color: #fff;
box-shadow: 0 4px 20px rgba(123,110,246,0.35);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(123,110,246,0.5); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
background: var(–bg4);
color: var(–text3);
box-shadow: none;
cursor: not-allowed;
transform: none;
}
.btn-secondary {
background: var(–bg3);
color: var(–text2);
border: 1px solid var(–line);
}
.btn-secondary:hover { background: var(–bg4); border-color: var(–line2); color: var(–text); }
.btn-ghost {
background: transparent;
color: var(–accent2);
border: 1px solid rgba(123,110,246,0.3);
}
.btn-ghost:hover { background: rgba(123,110,246,0.1); }
.btn-danger {
background: rgba(255,107,138,0.1);
color: var(–red);
border: 1px solid rgba(255,107,138,0.3);
}
.btn-danger:hover { background: rgba(255,107,138,0.2); }
.btn-green {
background: linear-gradient(135deg, #3db894, #2a9d8f);
color: #fff;
box-shadow: 0 4px 20px rgba(78,204,163,0.3);
}
.btn-green:hover { transform: translateY(-1px); }
.btn-date {
background: var(–bg3);
color: var(–accent2);
border: 1px solid rgba(123,110,246,0.35);
font-size: 13px;
padding: 10px 14px;
}
.btn-date:hover { background: rgba(123,110,246,0.1); }
.btn-row { display: grid; gap: 10px; margin-top: 12px; }
.btn-row-2 { grid-template-columns: 1fr 1fr; }

/* –– DATETIME –– */
.datetime-block {
text-align: center;
padding: 20px 0 12px;
}
.dt-date {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–text3);
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 6px;
}
.dt-time {
font-family: ‘Syne’, sans-serif;
font-size: 52px;
font-weight: 800;
letter-spacing: -3px;
line-height: 1;
background: linear-gradient(135deg, var(–text), var(–text2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.dt-weekday {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–text3);
letter-spacing: 2px;
margin-top: 4px;
text-transform: uppercase;
}

/* –– DATE OVERRIDE –– */
.date-override-bar {
display: flex;
align-items: center;
gap: 8px;
background: rgba(123,110,246,0.08);
border: 1px solid rgba(123,110,246,0.25);
border-radius: var(–r2);
padding: 10px 14px;
margin-bottom: 12px;
}
.date-override-text {
flex: 1;
font-family: ‘DM Mono’, monospace;
font-size: 13px;
color: var(–accent2);
}
.date-override-clear {
font-size: 18px;
color: var(–text3);
cursor: pointer;
padding: 2px 4px;
}
.date-override-clear:hover { color: var(–red); }

/* –– METRIC INPUT –– */
.metric-input-card {
background: var(–bg2);
border: 1px solid var(–line);
border-radius: var(–r);
padding: 18px 20px;
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 16px;
transition: border-color .2s;
}
.metric-input-card:focus-within { border-color: var(–accent); }
.metric-icon {
width: 44px;
height: 44px;
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
flex-shrink: 0;
}
.metric-input-right { flex: 1; }
.metric-input-name { font-size: 12px; color: var(–text2); margin-bottom: 4px; }
.metric-input-field { display: flex; align-items: baseline; gap: 6px; }
.metric-input-field input {
background: transparent;
border: none;
outline: none;
font-family: ‘DM Mono’, monospace;
font-size: 28px;
font-weight: 400;
color: var(–text);
width: 100%;
padding: 0;
appearance: none;
-webkit-appearance: none;
}
.metric-input-field input::placeholder { color: var(–text3); }
.metric-input-unit {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–text3);
white-space: nowrap;
}

/* –– BMI AUTO –– */
.bmi-auto-card {
background: rgba(96,180,255,0.06);
border: 1px solid rgba(96,180,255,0.2);
border-radius: var(–r);
padding: 14px 20px;
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 16px;
}
.bmi-auto-val {
font-family: ‘DM Mono’, monospace;
font-size: 28px;
color: var(–blue);
flex: 1;
}
.bmi-auto-label { font-size: 11px; color: var(–text3); margin-top: 2px; }

/* –– GOAL PROGRESS –– */
.goal-bar-wrap {
background: var(–bg3);
border-radius: 99px;
height: 4px;
margin-top: 6px;
overflow: hidden;
}
.goal-bar {
height: 100%;
border-radius: 99px;
transition: width .6s cubic-bezier(.4,0,.2,1);
}
.goal-label {
display: flex;
justify-content: space-between;
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–text3);
margin-top: 4px;
}

/* –– CHART –– */
.chart-container {
position: relative;
height: 220px;
margin: 12px 0 0;
}
.chart-toggle-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 0;
border-bottom: 1px solid var(–line);
}
.chart-toggle-row:last-child { border-bottom: none; }
.chart-label-dot {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
}
.chart-toggle-left { display: flex; align-items: center; gap: 10px; }
.chart-toggle-name { font-size: 13px; color: var(–text); }

/* –– STATS –– */
.stats-row {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
gap: 8px;
margin-bottom: 12px;
}
.stat-chip {
background: var(–bg3);
border: 1px solid var(–line);
border-radius: 10px;
padding: 12px 10px;
text-align: center;
}
.stat-chip-val {
font-family: ‘DM Mono’, monospace;
font-size: 17px;
line-height: 1;
margin-bottom: 4px;
}
.stat-chip-label { font-size: 10px; color: var(–text3); }

/* –– CHART CONTROLS –– */
.chart-controls {
display: flex;
flex-direction: column;
gap: 8px;
margin-bottom: 12px;
}
.ctrl-row {
display: flex;
align-items: center;
gap: 8px;
background: var(–bg3);
border: 1px solid var(–line);
border-radius: var(–r2);
padding: 8px 12px;
flex-wrap: wrap;
}
.ctrl-label {
font-size: 12px;
color: var(–text2);
min-width: 60px;
}
.ctrl-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.seg-btn {
padding: 5px 10px;
border-radius: 6px;
background: transparent;
border: 1px solid var(–line2);
color: var(–text2);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
cursor: pointer;
transition: all .2s;
white-space: nowrap;
}
.seg-btn.active {
background: var(–accent);
border-color: var(–accent);
color: #fff;
}
.n-btn {
width: 28px;
height: 28px;
border-radius: 7px;
background: var(–bg4);
border: 1px solid var(–line2);
color: var(–text);
font-size: 16px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all .15s;
}
.n-btn:hover { background: var(–accent); border-color: var(–accent); }
.n-val {
font-family: ‘DM Mono’, monospace;
font-size: 18px;
color: var(–accent2);
min-width: 36px;
text-align: center;
}

/* –– TAB –– */
.tab-bar {
display: flex;
background: var(–bg3);
border-radius: var(–r2);
padding: 3px;
margin-bottom: 12px;
border: 1px solid var(–line);
}
.tab-item {
flex: 1;
padding: 7px 4px;
text-align: center;
font-size: 11px;
color: var(–text2);
cursor: pointer;
border-radius: 6px;
transition: all .2s;
font-family: ‘DM Mono’, monospace;
}
.tab-item.active {
background: var(–bg);
color: var(–accent2);
border: 1px solid var(–line2);
}

/* –– TOAST –– */
#toast {
position: fixed;
bottom: 32px;
left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–bg3);
border: 1px solid var(–line2);
color: var(–text);
padding: 12px 24px;
border-radius: 99px;
font-size: 13px;
opacity: 0;
transition: all .3s cubic-bezier(.4,0,.2,1);
z-index: 1000;
white-space: nowrap;
box-shadow: var(–shadow);
pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* –– MODAL –– */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
backdrop-filter: blur(8px);
z-index: 100;
display: flex;
align-items: flex-end;
opacity: 0;
pointer-events: none;
transition: opacity .3s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-sheet {
width: 100%;
background: var(–bg2);
border-radius: 20px 20px 0 0;
border-top: 1px solid var(–line);
padding: 20px;
transform: translateY(100%);
transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.show .modal-sheet { transform: translateY(0); }
.modal-handle {
width: 40px;
height: 4px;
background: var(–line2);
border-radius: 99px;
margin: 0 auto 20px;
}
.modal-title {
font-family: ‘Syne’, sans-serif;
font-size: 16px;
font-weight: 600;
margin-bottom: 16px;
text-align: center;
}
.date-modal-grid { display: grid; gap: 12px; }
.date-modal-row { display: flex; align-items: center; gap: 12px; }
.date-modal-label { font-size: 13px; color: var(–text2); min-width: 80px; }
.date-modal-input {
flex: 1;
background: var(–bg3);
border: 1px solid var(–line);
border-radius: var(–r2);
padding: 10px 12px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 15px;
outline: none;
appearance: none;
-webkit-appearance: none;
color-scheme: dark;
}
.date-modal-input:focus { border-color: var(–accent); }
.time-check-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
.time-check-row label { font-size: 13px; color: var(–text2); cursor: pointer; }
input[type=“checkbox”] { width: 18px; height: 18px; accent-color: var(–accent); cursor: pointer; }

/* –– MISC –– */
.section-title {
font-family: ‘Syne’, sans-serif;
font-size: 13px;
font-weight: 600;
color: var(–text2);
letter-spacing: 0.5px;
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 8px;
}
.badge {
background: rgba(123,110,246,0.2);
color: var(–accent2);
border-radius: 99px;
padding: 2px 8px;
font-size: 10px;
font-family: ‘DM Mono’, monospace;
}
.empty-state { text-align: center; padding: 40px 20px; color: var(–text3); }
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; }
.record-count { font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–text3); }

.c-weight { color: var(–accent2); }
.c-fat    { color: var(–orange); }
.c-muscle { color: var(–green); }
.c-bmi    { color: var(–blue); }
.c-bmr    { color: var(–yellow); }
.bg-weight { background: rgba(165,148,255,0.15); }
.bg-fat    { background: rgba(255,159,67,0.15); }
.bg-muscle { background: rgba(78,204,163,0.15); }
.bg-bmi    { background: rgba(96,180,255,0.15); }
.bg-bmr    { background: rgba(255,209,102,0.15); }

.live-dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(–green);
display: inline-block;
margin-right: 6px;
animation: pulse 2s infinite;
}
@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: .4; transform: scale(0.7); }
}
</style>

</head>

<script>
// ========================================
// CONSTANTS
// ========================================
const METRICS = [
  { key:'weight', name:'体重',     unit:'kg',   icon:'⚖️', color:'#a594ff', cls:'c-weight', bg:'bg-weight', defaultOn:true,  autoCalc:false },
  { key:'fat',    name:'体脂肪率', unit:'%',    icon:'🔥', color:'#ff9f43', cls:'c-fat',    bg:'bg-fat',    defaultOn:false, autoCalc:false },
  { key:'muscle', name:'筋肉量',   unit:'kg',   icon:'💪', color:'#4ecca3', cls:'c-muscle', bg:'bg-muscle', defaultOn:false, autoCalc:false },
  { key:'bmi',    name:'BMI',      unit:'',     icon:'📊', color:'#60b4ff', cls:'c-bmi',    bg:'bg-bmi',    defaultOn:false, autoCalc:true  },
  { key:'bmr',    name:'基礎代謝', unit:'kcal', icon:'⚡', color:'#ffd166', cls:'c-bmr',    bg:'bg-bmr',    defaultOn:false, autoCalc:false },
];
const WEEKDAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const BMI_CATS = [
  { max:18.5,    label:'低体重',        color:'#60b4ff' },
  { max:25.0,    label:'普通体重',      color:'#4ecca3' },
  { max:30.0,    label:'肥満(1度)',    color:'#ffd166' },
  { max:35.0,    label:'肥満(2度)',    color:'#ff9f43' },
  { max:Infinity,label:'肥満(3度以上)', color:'#ff6b8a' },
];

// ========================================
// STATE
// ========================================
let settings = {
  height: null,
  gender: '',
  goalWeight: null,
  goalFat: null,
  goalMuscle: null,
  goalBmi: null,
  goalDate: null,
  metrics: { weight:true, fat:false, muscle:false, bmi:false, bmr:false },
  initialized: false
};
let records = [];
let chartInstances = {};
let chartVisibility = {};
let nDays = 14;
let xRangeDays = 0;
let yAxisMode = 'auto';
let currentChartTab = 'all';
let clockInterval = null;
let dateOverride = null;

// ========================================
// PERSIST
// ========================================
function load() {
  try { const s = JSON.parse(localStorage.getItem('bml_settings')); if (s) settings = s; } catch(e) {}
  try { const r = JSON.parse(localStorage.getItem('bml_records'));   if (r) records  = r; } catch(e) {}
  METRICS.forEach(m => {
    if (chartVisibility[m.key] === undefined) chartVisibility[m.key] = true;
  });
}
function save() {
  localStorage.setItem('bml_settings', JSON.stringify(settings));
  localStorage.setItem('bml_records',  JSON.stringify(records));
}

// ========================================
// NAVIGATION
// ========================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function goSettings() { stopClock(); renderSettings(); showScreen('settings'); }
function goRecord()   { renderRecord(); showScreen('record'); startClock(); }
function goChart()    { renderChart(); showScreen('chart'); stopClock(); }

function saveSettings() {
  settings.height     = parseFloat(document.getElementById('s-height').value) || null;
  settings.gender     = document.getElementById('s-gender').value || '';
  settings.goalWeight = parseFloat(document.getElementById('s-goal-weight').value) || null;
  settings.goalFat    = parseFloat(document.getElementById('s-goal-fat').value) || null;
  settings.goalMuscle = parseFloat(document.getElementById('s-goal-muscle').value) || null;
  settings.goalBmi    = parseFloat(document.getElementById('s-goal-bmi').value) || null;
  settings.goalDate   = document.getElementById('s-goal-date').value || null;
  settings.initialized = true;
  save();
  goRecord();
  toast('設定を保存しました ✓');
}

// ========================================
// SERVICE WORKER
// ========================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ========================================
// CLOCK
// ========================================
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const el_t = document.getElementById('rec-time');
  const el_d = document.getElementById('rec-date');
  const el_w = document.getElementById('rec-weekday');
  if (el_t) el_t.textContent = h + ':' + m;
  if (el_d) el_d.textContent = now.getFullYear() + '  ' + MONTHS[now.getMonth()] + '  ' + String(now.getDate()).padStart(2, '0');
  if (el_w) el_w.innerHTML = '<span class="live-dot"></span>' + WEEKDAYS[now.getDay()];
}
function startClock() {
  clearInterval(clockInterval);
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
}
function stopClock() { clearInterval(clockInterval); }

// ========================================
// DATE OVERRIDE
// ========================================
function toggleTimeInput() {
  const checked = document.getElementById('override-time-check').checked;
  document.getElementById('override-time-row').style.display = checked ? '' : 'none';
}

function applyDateOverride() {
  const dateVal = document.getElementById('override-date').value;
  if (!dateVal) { toast('日付を選択してください'); return; }
  const timeChk = document.getElementById('override-time-check').checked;
  const timeVal = timeChk ? document.getElementById('override-time').value : '';
  const dt = timeVal ? new Date(dateVal + 'T' + timeVal + ':00') : new Date(dateVal + 'T00:00:00');
  if (dt.getTime() > Date.now()) { toast('未来の日時は指定できません'); return; }
  const [y, mo, d] = dateVal.split('-');
  const dispTime = timeVal || '00:00';
  const dispText = y + '年' + parseInt(mo) + '月' + parseInt(d) + '日 ' + dispTime;
  dateOverride = { ts: dt.getTime(), date: dateVal, datetime: dt.toLocaleString('ja-JP'), displayText: dispText };
  document.getElementById('date-override-text').textContent = '📅 ' + dispText + ' として記録';
  document.getElementById('date-override-bar').style.display = '';
  closeModal('date-modal');
  toast('日付を指定しました');
}

function clearDateOverride() {
  dateOverride = null;
  document.getElementById('date-override-bar').style.display = 'none';
}

// ========================================
// SETTINGS RENDER
// ========================================
function renderSettings() {
  document.getElementById('s-height').value      = settings.height || '';
  document.getElementById('s-gender').value      = settings.gender || '';
  document.getElementById('s-goal-weight').value = settings.goalWeight || '';
  document.getElementById('s-goal-fat').value    = settings.goalFat || '';
  document.getElementById('s-goal-muscle').value = settings.goalMuscle || '';
  document.getElementById('s-goal-bmi').value    = settings.goalBmi || '';
  document.getElementById('s-goal-date').value   = settings.goalDate || '';

  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('s-goal-date').min = tomorrow.toISOString().split('T')[0];

  document.getElementById('metric-toggles').innerHTML = METRICS.map(m => `
    <div class="toggle-row">
      <div class="toggle-label">
        <span class="toggle-name">${m.icon} ${m.name}${m.autoCalc ? ' <span style="font-size:10px;color:var(--blue)">(自動計算)</span>' : ''}</span>
        <span class="toggle-desc ${m.cls}">${m.unit || '指数'}</span>
      </div>
      <div class="toggle ${settings.metrics[m.key] ? 'on' : ''}" id="tog-${m.key}" onclick="toggleMetric('${m.key}')">
        <div class="toggle-knob"></div>
      </div>
    </div>`).join('');
}

function toggleMetric(key) {
  settings.metrics[key] = !settings.metrics[key];
  document.getElementById('tog-' + key).classList.toggle('on', settings.metrics[key]);
}

// ========================================
// RECORD RENDER
// ========================================
function renderRecord() {
  const today = new Date().toISOString().split('T')[0];
  const di = document.getElementById('override-date');
  if (di && !di.value) di.value = today;

  const enabled = METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc);
  document.getElementById('metric-inputs').innerHTML = enabled.map(m => `
    <div class="metric-input-card" id="mic-${m.key}">
      <div class="metric-icon ${m.bg}">${m.icon}</div>
      <div class="metric-input-right">
        <div class="metric-input-name ${m.cls}">${m.name}</div>
        <div class="metric-input-field">
          <input type="number" inputmode="decimal" placeholder="- - -"
            id="inp-${m.key}" oninput="onMetricInput()" style="color:${m.color}">
          <span class="metric-input-unit">${m.unit}</span>
        </div>
      </div>
    </div>`).join('');

  const bmiOn = settings.metrics['bmi'];
  document.getElementById('bmi-auto-display').style.display = bmiOn ? '' : 'none';
  if (bmiOn) updateBmiDisplay();
  renderGoalProgress();
  checkRecordBtn();
}

function onMetricInput() {
  if (settings.metrics['bmi']) updateBmiDisplay();
  checkRecordBtn();
}

function calcBmi() {
  if (!settings.height) return null;
  const el = document.getElementById('inp-weight');
  if (!el) return null;
  const w = parseFloat(el.value);
  if (isNaN(w) || w <= 0) return null;
  const hm = settings.height / 100;
  return Math.round(w / (hm * hm) * 10) / 10;
}

function updateBmiDisplay() {
  const bmi = calcBmi();
  const valEl   = document.getElementById('bmi-auto-val');
  const labelEl = document.getElementById('bmi-auto-label');
  if (!valEl) return;
  if (bmi === null) {
    valEl.textContent = '- - -';
    valEl.style.color = 'var(--text3)';
    labelEl.textContent = settings.height ? '体重を入力すると計算されます' : '設定で身長を登録してください';
    labelEl.style.color = 'var(--text3)';
  } else {
    const cat = BMI_CATS.find(c => bmi < c.max);
    valEl.textContent = bmi;
    valEl.style.color = cat.color;
    labelEl.textContent = cat.label;
    labelEl.style.color = cat.color;
  }
}

function checkRecordBtn() {
  const enabled = METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc);
  const any = enabled.some(m => {
    const el = document.getElementById('inp-' + m.key);
    return el && el.value.trim() !== '';
  });
  document.getElementById('btn-record').disabled = !any;
}

function renderGoalProgress() {
  const gp = document.getElementById('goal-progress');
  const gi = document.getElementById('goal-progress-inner');
  const last = records.length ? [...records].sort((a,b) => b.ts - a.ts)[0] : null;
  if (!last) { gp.style.display = 'none'; return; }
  let html = '';
  if (settings.goalWeight && last.weight) {
    const diff = (last.weight - settings.goalWeight).toFixed(1);
    const prog = Math.max(0, Math.min(100, 100 - Math.abs(diff) * 5));
    html += goalBar('体重', last.weight, settings.goalWeight, diff, prog, 'kg');
  }
  if (settings.goalFat && last.fat) {
    const diff = (last.fat - settings.goalFat).toFixed(1);
    const prog = Math.max(0, Math.min(100, 100 - Math.abs(diff) * 3));
    html += goalBar('体脂肪率', last.fat, settings.goalFat, diff, prog, '%');
  }
  if (html) { gi.innerHTML = html; gp.style.display = ''; }
  else gp.style.display = 'none';
}

function goalBar(name, cur, goal, diff, prog, unit) {
  const sign = diff > 0 ? '+' : '';
  const color = Math.abs(diff) < 1 ? '#4ecca3' : '#a594ff';
  return `
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:12px;color:var(--text2)">${name}</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:${color}">${sign}${diff} ${unit}</span>
      </div>
      <div class="goal-bar-wrap">
        <div class="goal-bar" style="width:${prog}%;background:${color}"></div>
      </div>
      <div class="goal-label">
        <span>現在 ${cur}${unit}</span><span>目標 ${goal}${unit}</span>
      </div>
    </div>`;
}

// ========================================
// SAVE RECORD
// ========================================
function saveRecord() {
  let ts, date, datetime;
  if (dateOverride) {
    ts = dateOverride.ts; date = dateOverride.date; datetime = dateOverride.datetime;
  } else {
    const now = new Date();
    ts = now.getTime(); date = now.toISOString().split('T')[0]; datetime = now.toLocaleString('ja-JP');
  }
  const rec = { ts, date, datetime };
  let hasData = false;
  METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc).forEach(m => {
    const val = parseFloat(document.getElementById('inp-' + m.key)?.value);
    if (!isNaN(val)) { rec[m.key] = val; hasData = true; }
  });
  if (!hasData) return;
  if (settings.metrics['bmi']) {
    const bmi = calcBmi();
    if (bmi !== null) rec['bmi'] = bmi;
  }
  records.push(rec);
  save();
  toast('記録しました ✓');
  METRICS.forEach(m => { const el = document.getElementById('inp-' + m.key); if (el) el.value = ''; });
  clearDateOverride();
  checkRecordBtn();
  if (settings.metrics['bmi']) updateBmiDisplay();
  setTimeout(() => goChart(), 600);
}

// ========================================
// CHART SCREEN
// ========================================
function renderChart() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartInstances = {};

  const enabled = METRICS.filter(m => settings.metrics[m.key]);
  const content = document.getElementById('chart-content');

  if (!records.length) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">まだ記録がありません<br>最初のデータを記録しましょう</div>
      </div>
      <button class="btn btn-primary" onclick="goRecord()" style="margin-top:8px">データを記録する</button>`;
    return;
  }

  const xOpts = [
    { label:'7日', val:7 }, { label:'14日', val:14 }, { label:'30日', val:30 },
    { label:'90日', val:90 }, { label:'全期間', val:0 }
  ];

  const togglesHtml = enabled.map(m => `
    <div class="chart-toggle-row">
      <div class="chart-toggle-left">
        <div class="chart-label-dot" style="background:${m.color}"></div>
        <span class="chart-toggle-name">${m.icon} ${m.name}${m.autoCalc ? ' <span style="font-size:10px;opacity:.6">(自動)</span>' : ''}</span>
      </div>
      <div class="toggle ${chartVisibility[m.key] ? 'on' : ''}" id="cv-${m.key}" onclick="toggleChartVisibility('${m.key}')"></div>
    </div>`).join('');

  content.innerHTML = `
    ${buildStatsHtml(enabled)}

    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-label" style="margin-bottom:0">グラフ表示</div>
        <span class="record-count">${records.length} 件</span>
      </div>

      <div class="tab-bar">
        <div class="tab-item ${currentChartTab === 'all' ? 'active' : ''}" onclick="switchChartTab('all',this)">全期間</div>
        <div class="tab-item ${currentChartTab === 'ma' ? 'active' : ''}" onclick="switchChartTab('ma',this)">移動平均</div>
      </div>

      <div class="chart-controls">
        <div class="ctrl-row">
          <span class="ctrl-label">表示幅</span>
          <div class="ctrl-btns">
            ${xOpts.map(o => `<button class="seg-btn ${xRangeDays === o.val ? 'active' : ''}" onclick="setXRange(${o.val})">${o.label}</button>`).join('')}
          </div>
        </div>
        <div class="ctrl-row" id="ma-ctrl" style="display:${currentChartTab === 'ma' ? '' : 'none'}">
          <span class="ctrl-label">移動平均</span>
          <button class="n-btn" onclick="changeN(-1)">-</button>
          <span class="n-val" id="n-val">${nDays}</span>
          <button class="n-btn" onclick="changeN(1)">+</button>
          <span style="font-size:12px;color:var(--text3)">日</span>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Y軸原点</span>
          <div class="ctrl-btns">
            <button class="seg-btn ${yAxisMode === 'auto' ? 'active' : ''}" onclick="setYMode('auto')">データ範囲</button>
            <button class="seg-btn ${yAxisMode === 'zero' ? 'active' : ''}" onclick="setYMode('zero')">ゼロ起点</button>
          </div>
        </div>
      </div>

      ${togglesHtml}
    </div>

    <div id="charts-area">
      ${enabled.map(m => `
        <div class="card" id="chart-card-${m.key}" style="${chartVisibility[m.key] ? '' : 'display:none'}">
          <div class="section-title">
            <span style="color:${m.color}">${m.icon} ${m.name}</span>
            ${m.unit ? `<span class="badge">${m.unit}</span>` : ''}
          </div>
          <div class="chart-container"><canvas id="chart-${m.key}"></canvas></div>
        </div>`).join('')}
    </div>

    <div style="height:12px"></div>
    <button class="btn btn-green" onclick="showModal('export-modal')">結果を出力</button>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-secondary" onclick="goRecord()">データを記録する</button>
    </div>
    <button class="btn btn-danger" onclick="showModal('clear-modal')" style="margin-top:10px;padding:12px;font-size:13px">
      全データを削除
    </button>
    <div style="height:40px"></div>`;

  buildCharts(enabled, currentChartTab);
}

function buildStatsHtml(enabled) {
  const last = [...records].sort((a,b) => b.ts - a.ts)[0];
  const chips = enabled.map(m => {
    const v = last[m.key];
    return v != null
      ? `<div class="stat-chip"><div class="stat-chip-val ${m.cls}">${v}${m.unit}</div><div class="stat-chip-label">${m.name}</div></div>`
      : '';
  }).join('');
  return `
    <div class="card" style="margin-bottom:12px">
      <div class="card-label">最新の記録 — ${new Date(last.ts).toLocaleDateString('ja-JP')}</div>
      <div class="stats-row">${chips}</div>
    </div>`;
}

// ========================================
// BUILD CHARTS
// ========================================
function buildCharts(enabled, mode) {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartInstances = {};
  const sorted = [...records].sort((a,b) => a.ts - b.ts);
  if (mode === 'ma') buildMACharts(enabled, sorted);
  else               buildAllCharts(enabled, sorted);
}

function filterByRange(data) {
  if (xRangeDays === 0) return data;
  const cutoff = Date.now() - xRangeDays * 86400000;
  return data.filter(r => r.ts >= cutoff);
}

function buildAllCharts(enabled, sortedData) {
  const data = filterByRange(sortedData);
  const labels = data.map(r => {
    const d = new Date(r.ts);
    return (d.getMonth() + 1) + '/' + d.getDate();
  });

  enabled.forEach(m => {
    const canvas = document.getElementById('chart-' + m.key);
    if (!canvas || !chartVisibility[m.key]) return;

    const vals = data.map(r => r[m.key] ?? null);
    const goalDs = buildGoalDataset(m, data, labels);

    chartInstances[m.key] = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: m.name,
            data: vals,
            borderColor: m.color,
            backgroundColor: m.color + '22',
            borderWidth: 2,
            pointRadius: data.length > 60 ? 0 : 4,
            pointBackgroundColor: m.color,
            pointBorderColor: '#0a0a0f',
            pointBorderWidth: 2,
            tension: 0.3,
            fill: true,
            spanGaps: true },
          ...(goalDs ? [goalDs] : [])
        ]
      },
      options: buildChartOptions(m)
    });
  });
}

function buildMACharts(enabled, sortedData) {
  const data = filterByRange(sortedData);

  // Step 1: aggregate to daily averages
  const dailyMap = {};
  data.forEach(r => {
    if (!dailyMap[r.date]) dailyMap[r.date] = {};
    METRICS.forEach(m => {
      if (r[m.key] != null) {
        if (!dailyMap[r.date][m.key]) dailyMap[r.date][m.key] = [];
        dailyMap[r.date][m.key].push(r[m.key]);
      }
    });
  });
  const days = Object.keys(dailyMap).sort();
  const dailyData = days.map(date => {
    const entry = { date };
    METRICS.forEach(m => {
      const arr = dailyMap[date][m.key];
      entry[m.key] = arr ? Math.round(arr.reduce((a,b) => a+b, 0) / arr.length * 100) / 100 : null;
    });
    return entry;
  });

  // Step 2: n-day moving average
  function movingAvg(arr, n) {
    return arr.map((_, i) => {
      const window = arr.slice(Math.max(0, i - n + 1), i + 1).filter(v => v != null);
      return window.length ? Math.round(window.reduce((a,b) => a+b,0) / window.length * 100) / 100 : null;
    });
  }

  const labels = dailyData.map(d => {
    const [, mo, da] = d.date.split('-');
    return parseInt(mo) + '/' + parseInt(da);
  });

  enabled.forEach(m => {
    const canvas = document.getElementById('chart-' + m.key);
    if (!canvas || !chartVisibility[m.key]) return;

    const rawVals = dailyData.map(d => d[m.key]);
    const maVals  = movingAvg(rawVals, nDays);
    const goalDs  = buildGoalDataset(m, data, labels);

    chartInstances[m.key] = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: m.name + ' 日次平均',
            data: rawVals,
            borderColor: m.color + '55',
            backgroundColor: 'transparent',
            borderWidth: 1,
            pointRadius: 2,
            pointBackgroundColor: m.color + '88',
            tension: 0.2,
            spanGaps: true,
            borderDash: [3, 4] },
          { label: m.name + ' ' + nDays + '日移動平均',
            data: maVals,
            borderColor: m.color,
            backgroundColor: m.color + '22',
            borderWidth: 2.5,
            pointRadius: 0,
            tension: 0.4,
            fill: true,
            spanGaps: true },
          ...(goalDs ? [goalDs] : [])
        ]
      },
      options: buildChartOptions(m)
    });
  });
}

function buildGoalDataset(m, data, labels) {
  if (!settings.goalDate) return null;
  const goalDateMs = new Date(settings.goalDate + 'T00:00:00').getTime();
  const lastRec = data.length ? data[data.length - 1] : null;
  if (!lastRec) return null;

  let goalVal = null;
  if      (m.key === 'weight') goalVal = settings.goalWeight;
  else if (m.key === 'fat')    goalVal = settings.goalFat;
  else if (m.key === 'muscle') goalVal = settings.goalMuscle;
  else if (m.key === 'bmi')    goalVal = settings.goalBmi;
  if (goalVal == null) return null;

  const lastVal = lastRec[m.key];
  if (lastVal == null) return null;

  // Build sparse dataset: null except at last point and goal point
  const goalData = labels.map(() => null);
  goalData[labels.length - 1] = lastVal;

  const allLabels = [...labels];
  const allGoalData = [...goalData];

  if (goalDateMs > lastRec.ts) {
    const gd = new Date(goalDateMs);
    allLabels.push((gd.getMonth() + 1) + '/' + gd.getDate());
    allGoalData.push(goalVal);
  }

  return {
    label: '目標ライン',
    data: allGoalData,
    borderColor: m.color + '90',
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    borderDash: [6, 4],
    pointRadius: allGoalData.map((v, i) => (v != null ? 4 : 0)),
    pointBackgroundColor: m.color + 'aa',
    pointBorderColor: '#0a0a0f',
    pointBorderWidth: 1,
    tension: 0,
    spanGaps: true,
    fill: false,
  };
}

function buildChartOptions(m) {
  let goalVal = null;
  if      (m.key === 'weight') goalVal = settings.goalWeight;
  else if (m.key === 'fat')    goalVal = settings.goalFat;
  else if (m.key === 'muscle') goalVal = settings.goalMuscle;
  else if (m.key === 'bmi')    goalVal = settings.goalBmi;

  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 500 },
    interaction: { intersect: false, mode: 'index' },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1a24',
        borderColor: '#3a3a50',
        borderWidth: 1,
        titleColor: '#9090a8',
        bodyColor: '#e8e8f0',
        padding: 10,
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.formattedValue + m.unit
        }
      }
    },
    scales: {
      x: {
        grid: { color: '#2a2a3a' },
        ticks: { color: '#5a5a72', font: { family: 'DM Mono', size: 10 }, maxTicksLimit: 8 }
      },
      y: {
        grid: { color: '#2a2a3a' },
        min: yAxisMode === 'zero' ? 0 : undefined,
        ticks: {
          color: '#5a5a72',
          font: { family: 'DM Mono', size: 10 },
          callback: v => v + m.unit
        },
        afterDataLimits: (yAxisMode !== 'zero' && goalVal != null) ? (scale => {
          scale.min = Math.min(scale.min, goalVal) - 0.5;
          scale.max = Math.max(scale.max, goalVal) + 0.5;
        }) : undefined,
      }
    }
  };
}

// ========================================
// CHART CONTROLS
// ========================================
function switchChartTab(mode, el) {
  currentChartTab = mode;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const mc = document.getElementById('ma-ctrl');
  if (mc) mc.style.display = mode === 'ma' ? '' : 'none';
  buildCharts(METRICS.filter(m => settings.metrics[m.key]), mode);
}

function changeN(delta) {
  nDays = Math.max(2, Math.min(365, nDays + delta));
  const el = document.getElementById('n-val');
  if (el) el.textContent = nDays;
  if (currentChartTab === 'ma') buildCharts(METRICS.filter(m => settings.metrics[m.key]), 'ma');
}

function setXRange(val) {
  xRangeDays = val;
  document.querySelectorAll('.seg-btn').forEach(b => {
    const btnVal = b.getAttribute('onclick')?.match(/setXRange\((\d+)\)/)?.[1];
    if (btnVal !== null && btnVal !== undefined) {
      b.classList.toggle('active', parseInt(btnVal) === val);
    }
  });
  buildCharts(METRICS.filter(m => settings.metrics[m.key]), currentChartTab);
}

function setYMode(mode) {
  yAxisMode = mode;
  document.querySelectorAll('.seg-btn').forEach(b => {
    const match = b.getAttribute('onclick')?.match(/setYMode\('(\w+)'\)/);
    if (match) b.classList.toggle('active', match[1] === mode);
  });
  buildCharts(METRICS.filter(m => settings.metrics[m.key]), currentChartTab);
}

function toggleChartVisibility(key) {
  chartVisibility[key] = !chartVisibility[key];
  document.getElementById('cv-' + key)?.classList.toggle('on', chartVisibility[key]);
  const card = document.getElementById('chart-card-' + key);
  if (card) card.style.display = chartVisibility[key] ? '' : 'none';
  if (chartVisibility[key]) buildCharts(METRICS.filter(m => settings.metrics[m.key]), currentChartTab);
  else { if (chartInstances[key]) { chartInstances[key].destroy(); delete chartInstances[key]; } }
}

// ========================================
// EXPORT
// ========================================
function getVisibleMetrics() {
  return METRICS.filter(m => settings.metrics[m.key] && chartVisibility[m.key]);
}

function exportCSV() {
  closeModal('export-modal');
  const vis = getVisibleMetrics();
  if (!vis.length) { toast('出力するデータがありません'); return; }
  const headers = ['日時', '日付', ...vis.map(m => m.name + '(' + (m.unit || '-') + ')')];
  const rows = [...records].sort((a,b) => a.ts - b.ts).map(r => [
    r.datetime || r.date, r.date, ...vis.map(m => r[m.key] ?? '')
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bodymasslog_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSVをダウンロードしました ✓');
}

function exportClipboard() {
  closeModal('export-modal');
  const vis = getVisibleMetrics();
  if (!vis.length) { toast('出力するデータがありません'); return; }
  const sorted = [...records].sort((a,b) => a.ts - b.ts);
  let text = '【BodyMassLog 記録データ】\n';
  text += '出力日: ' + new Date().toLocaleDateString('ja-JP') + '\n';
  if (settings.height) text += '身長: ' + settings.height + 'cm\n';
  if (settings.gender) text += '性別: ' + (settings.gender === 'male' ? '男性' : '女性') + '\n';
  text += '\n【目標値】\n';
  if (settings.goalWeight) text += '目標体重: ' + settings.goalWeight + 'kg\n';
  if (settings.goalFat)    text += '目標体脂肪率: ' + settings.goalFat + '%\n';
  if (settings.goalMuscle) text += '目標筋肉量: ' + settings.goalMuscle + 'kg\n';
  if (settings.goalBmi)    text += '目標BMI: ' + settings.goalBmi + '\n';
  if (settings.goalDate)   text += '目標達成日: ' + settings.goalDate + '\n';
  text += '\n記録期間: ' + sorted[0]?.date + ' 〜 ' + sorted[sorted.length-1]?.date + '\n';
  text += '記録件数: ' + sorted.length + '件\n\n【時系列データ】\n';
  sorted.forEach(r => {
    const line = vis.map(m => r[m.key] != null ? m.name + ':' + r[m.key] + m.unit : null).filter(Boolean).join(', ');
    if (line) text += (r.datetime || r.date) + ' - ' + line + '\n';
  });
  text += '\n以上のデータを分析し、目標達成に向けた傾向や改善点を教えてください。';

  navigator.clipboard.writeText(text).then(() => {
    toast('クリップボードにコピーしました ✓');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('クリップボードにコピーしました ✓');
  });
}

function clearAllData() {
  records = [];
  save();
  closeModal('clear-modal');
  toast('全データを削除しました');
  renderChart();
}

// ========================================
// MODAL / TOAST
// ========================================
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('show');
  });
});

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ========================================
// INIT
// ========================================
load();
if (!settings.initialized) { renderSettings(); showScreen('settings'); }
else goRecord();
</script>
