<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BodyMassLog">
<meta name="description" content="体重・体組成を記録・分析するアプリ">
<link rel="manifest" href="manifest.json">
<title>BodyMassLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #222230;
    --line: #2a2a3a;
    --line2: #3a3a50;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #7b6ef6;
    --accent2: #a594ff;
    --green: #4ecca3;
    --red: #ff6b8a;
    --yellow: #ffd166;
    --blue: #60b4ff;
    --orange: #ff9f43;
    --r: 12px;
    --r2: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
    color-scheme: dark;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; overflow: hidden; }
  #app { height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  /* SCREENS */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transform: translateY(20px); transition: opacity .35s cubic-bezier(.4,0,.2,1), transform .35s cubic-bezier(.4,0,.2,1); overflow: hidden; }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }

  /* TOPBAR */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--line); background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); flex-shrink: 0; position: relative; z-index: 10; }
  .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent2), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .topbar-subtitle { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-top: 1px; letter-spacing: 1px; }
  .icon-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--line); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
  .icon-btn:hover { background: var(--bg4); border-color: var(--line2); }
  .icon-btn svg { width: 18px; height: 18px; color: var(--text2); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
  .content::-webkit-scrollbar { width: 3px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 99px; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); padding: 20px; margin-bottom: 12px; }
  .card-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }

  /* FORM */
  .field-group { margin-bottom: 16px; }
  .field-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .field-unit { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }
  .input { width: 100%; background: var(--bg3); border: 1px solid var(--line); border-radius: var(--r2); padding: 12px 14px; color: var(--text); font-size: 16px; font-family: 'DM Mono', monospace; transition: border-color .2s, box-shadow .2s; outline: none; appearance: none; -webkit-appearance: none; color-scheme: dark; }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123,110,246,0.15); }
  .input::placeholder { color: var(--text3); }
  select.input { padding: 11px 14px; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .settings-grid .field-group { margin-bottom: 0; }

  /* TOGGLE */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { display: flex; flex-direction: column; gap: 2px; }
  .toggle-name { font-size: 14px; color: var(--text); }
  .toggle-desc { font-size: 11px; color: var(--text3); }
  .toggle { width: 44px; height: 26px; background: var(--bg4); border-radius: 99px; position: relative; cursor: pointer; transition: background .25s; flex-shrink: 0; border: 1px solid var(--line2); }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: transform .25s cubic-bezier(.4,0,.2,1); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .toggle.on::after { transform: translateX(18px); }

  /* BUTTONS */
  .btn { width: 100%; padding: 15px; border-radius: var(--r2); border: none; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; letter-spacing: 0.5px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #6056d4); color: #fff; box-shadow: 0 4px 20px rgba(123,110,246,0.35); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(123,110,246,0.5); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { background: var(--bg4); color: var(--text3); box-shadow: none; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--line); }
  .btn-secondary:hover { background: var(--bg4); border-color: var(--line2); color: var(--text); }
  .btn-ghost { background: transparent; color: var(--accent2); border: 1px solid rgba(123,110,246,0.3); }
  .btn-ghost:hover { background: rgba(123,110,246,0.1); }
  .btn-danger { background: rgba(255,107,138,0.1); color: var(--red); border: 1px solid rgba(255,107,138,0.3); }
  .btn-danger:hover { background: rgba(255,107,138,0.2); }
  .btn-green { background: linear-gradient(135deg, #3db894, #2a9d8f); color: #fff; box-shadow: 0 4px 20px rgba(78,204,163,0.3); }
  .btn-green:hover { transform: translateY(-1px); }
  .btn-date { background: var(--bg3); color: var(--accent2); border: 1px solid rgba(123,110,246,0.35); font-size: 13px; padding: 10px 14px; }
  .btn-date:hover { background: rgba(123,110,246,0.1); }
  .btn-row { display: grid; gap: 10px; margin-top: 12px; }
  .btn-row-2 { grid-template-columns: 1fr 1fr; }

  /* DATETIME */
  .datetime-block { text-align: center; padding: 20px 0 12px; }
  .dt-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .dt-time { font-family: 'Syne', sans-serif; font-size: 52px; font-weight: 800; letter-spacing: -3px; line-height: 1; background: linear-gradient(135deg, var(--text), var(--text2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .dt-weekday { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

  /* DATE OVERRIDE */
  .date-override-bar { display: flex; align-items: center; gap: 8px; background: rgba(123,110,246,0.08); border: 1px solid rgba(123,110,246,0.25); border-radius: var(--r2); padding: 10px 14px; margin-bottom: 12px; }
  .date-override-text { flex: 1; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent2); }
  .date-override-clear { font-size: 18px; color: var(--text3); cursor: pointer; padding: 2px 4px; }
  .date-override-clear:hover { color: var(--red); }

  /* METRIC INPUT */
  .metric-input-card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); padding: 18px 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 16px; transition: border-color .2s; }
  .metric-input-card:focus-within { border-color: var(--accent); }
  .metric-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .metric-input-right { flex: 1; }
  .metric-input-name { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .metric-input-field { display: flex; align-items: baseline; gap: 6px; }
  .metric-input-field input { background: transparent; border: none; outline: none; font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 400; color: var(--text); width: 100%; padding: 0; appearance: none; -webkit-appearance: none; }
  .metric-input-field input::placeholder { color: var(--text3); }
  .metric-input-unit { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); white-space: nowrap; }

  /* BMI AUTO */
  .bmi-auto-card { background: rgba(96,180,255,0.06); border: 1px solid rgba(96,180,255,0.2); border-radius: var(--r); padding: 14px 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 16px; }
  .bmi-auto-val { font-family: 'DM Mono', monospace; font-size: 28px; color: var(--blue); flex: 1; }
  .bmi-auto-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* GOAL PROGRESS */
  .goal-bar-wrap { background: var(--bg3); border-radius: 99px; height: 4px; margin-top: 6px; overflow: hidden; }
  .goal-bar { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .goal-label { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* CHART */
  .chart-container { position: relative; height: 220px; margin: 12px 0 0; }
  .chart-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .chart-toggle-row:last-child { border-bottom: none; }
  .chart-label-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chart-toggle-left { display: flex; align-items: center; gap: 10px; }
  .chart-toggle-name { font-size: 13px; color: var(--text); }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .stat-chip { background: var(--bg3); border: 1px solid var(--line); border-radius: 10px; padding: 12px 10px; text-align: center; }
  .stat-chip-val { font-family: 'DM Mono', monospace; font-size: 17px; line-height: 1; margin-bottom: 4px; }
  .stat-chip-label { font-size: 10px; color: var(--text3); }

  /* CHART CONTROLS */
  .chart-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--line); border-radius: var(--r2); padding: 8px 12px; flex-wrap: wrap; }
  .ctrl-label { font-size: 12px; color: var(--text2); min-width: 60px; }
  .ctrl-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg-btn { padding: 5px 10px; border-radius: 6px; background: transparent; border: 1px solid var(--line2); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .seg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* SMOOTHNESS SLIDER */
  .smooth-slider-wrap { display:flex; flex-direction:column; gap:8px; width:100%; }
  .smooth-slider { -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:99px; background:var(--line2); outline:none; cursor:pointer; }
  .smooth-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); border:3px solid var(--bg); box-shadow:0 2px 8px rgba(0,0,0,0.5); cursor:pointer; }
  .smooth-slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:var(--accent); border:3px solid var(--bg); cursor:pointer; }
  .smooth-slider-labels { display:flex; justify-content:space-between; }
  .smooth-slider-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--text3); }

  /* TOAST */
  #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--line2); color: var(--text); padding: 12px 24px; border-radius: 99px; font-size: 13px; opacity: 0; transition: all .3s cubic-bezier(.4,0,.2,1); z-index: 1000; white-space: nowrap; box-shadow: var(--shadow); pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-sheet { width: 100%; background: var(--bg2); border-radius: 20px 20px 0 0; border-top: 1px solid var(--line); padding: 20px; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
  .modal-overlay.show .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--line2); border-radius: 99px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 16px; text-align: center; }
  .date-modal-grid { display: grid; gap: 12px; }
  .date-modal-row { display: flex; align-items: center; gap: 12px; }
  .date-modal-label { font-size: 13px; color: var(--text2); min-width: 80px; }
  .date-modal-input { flex: 1; background: var(--bg3); border: 1px solid var(--line); border-radius: var(--r2); padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px; outline: none; appearance: none; -webkit-appearance: none; color-scheme: dark; }
  .date-modal-input:focus { border-color: var(--accent); }
  .time-check-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .time-check-row label { font-size: 13px; color: var(--text2); cursor: pointer; }
  input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

  /* MISC */
  .section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .badge { background: rgba(123,110,246,0.2); color: var(--accent2); border-radius: 99px; padding: 2px 8px; font-size: 10px; font-family: 'DM Mono', monospace; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state-text { font-size: 14px; }
  .record-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

  .c-weight { color: var(--accent2); }
  .c-fat    { color: var(--orange); }
  .c-muscle { color: var(--green); }
  .c-bmi    { color: var(--blue); }
  .c-bmr    { color: var(--yellow); }
  .bg-weight { background: rgba(165,148,255,0.15); }
  .bg-fat    { background: rgba(255,159,67,0.15); }
  .bg-muscle { background: rgba(78,204,163,0.15); }
  .bg-bmi    { background: rgba(96,180,255,0.15); }
  .bg-bmr    { background: rgba(255,209,102,0.15); }

  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(0.7); } }

  /* DATA LIST */
  .modal-sheet-scroll { max-height: 80dvh; overflow-y: auto; }
  .data-list-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .data-list-item:last-child { border-bottom: none; }
  .data-list-meta { min-width: 0; flex: 1; }
  .data-list-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .data-list-vals { display: flex; flex-wrap: wrap; gap: 6px; }
  .data-list-val-chip { font-family: 'DM Mono', monospace; font-size: 12px; padding: 2px 8px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--line); }
  .data-list-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
  .data-edit-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--line2); color: var(--text2); cursor: pointer; white-space: nowrap; }
  .data-edit-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .data-del-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; background: rgba(255,107,138,0.08); border: 1px solid rgba(255,107,138,0.25); color: var(--red); cursor: pointer; white-space: nowrap; }
  .data-del-btn:hover { background: rgba(255,107,138,0.18); }

  /* EDIT MODAL */
  .edit-field-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .edit-field-label { font-size: 13px; color: var(--text2); min-width: 80px; flex-shrink: 0; }
  .edit-input { flex: 1; background: var(--bg3); border: 1px solid var(--line); border-radius: var(--r2); padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; outline: none; appearance: none; -webkit-appearance: none; color-scheme: dark; }
  .edit-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123,110,246,0.15); }
  .edit-date-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); background: var(--bg3); border: 1px solid var(--line); border-radius: var(--r2); padding: 10px 12px; flex: 1; }
</style>
</head>
<body>
<div id="app">

<!-- ======= SETTINGS SCREEN ======= -->
<div class="screen" id="screen-settings">
  <div class="topbar">
    <div>
      <div class="topbar-logo">BodyMassLog</div>
      <div class="topbar-subtitle">SETTINGS</div>
      <span id="ver-settings" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-left:6px;align-self:flex-end;padding-bottom:2px"></span>
    </div>
    <div style="width:38px"></div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-label">プロフィール</div>
      <div class="settings-grid">
        <div class="field-group">
          <div class="field-label">身長 <span class="field-unit">cm</span></div>
          <input class="input" type="number" id="s-height" placeholder="170" inputmode="decimal" min="0.1">
        </div>
        <div class="field-group">
          <div class="field-label">性別</div>
          <select class="input" id="s-gender">
            <option value="">未設定</option>
            <option value="male">男性</option>
            <option value="female">女性</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">目標値（任意）</div>
      <div class="settings-grid">
        <div class="field-group">
          <div class="field-label">体重 <span class="field-unit">kg</span></div>
          <input class="input" type="number" id="s-goal-weight" placeholder="65.0" inputmode="decimal" min="0.1">
        </div>
        <div class="field-group">
          <div class="field-label">体脂肪率 <span class="field-unit">%</span></div>
          <input class="input" type="number" id="s-goal-fat" placeholder="20" inputmode="decimal" min="0.1">
        </div>
        <div class="field-group">
          <div class="field-label">筋肉量 <span class="field-unit">kg</span></div>
          <input class="input" type="number" id="s-goal-muscle" placeholder="50" inputmode="decimal" min="0.1">
        </div>
        <div class="field-group">
          <div class="field-label">目標BMI</div>
          <input class="input" type="number" id="s-goal-bmi" placeholder="22" inputmode="decimal" min="0.1">
        </div>
      </div>
      <div class="field-group" style="margin-top:12px; margin-bottom:0">
        <div class="field-label">目標達成日 <span class="field-unit">翌日以降</span></div>
        <input class="input" type="date" id="s-goal-date">
      </div>
    </div>

    <div class="card">
      <div class="card-label">記録するデータ</div>
      <div id="metric-toggles"></div>
    </div>

    <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:4px">保存して開始</button>
    <div style="height:32px"></div>
  </div>
</div>

<!-- ======= RECORD SCREEN ======= -->
<div class="screen" id="screen-record">
  <div class="topbar">
    <div class="topbar-logo">BodyMassLog</div>
    <span id="ver-record" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);align-self:flex-end;padding-bottom:3px;margin-left:6px"></span>
    <div style="flex:1"></div>
    <button class="icon-btn" onclick="goSettings()" title="設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="3"/>

<script>
// ========================================
const APP_VERSION = '1.5';
// CONSTANTS
// ========================================
const METRICS = [
  { key:'weight', name:'体重',     unit:'kg',   icon:'&#9878;',  color:'#a594ff', cls:'c-weight', bg:'bg-weight', defaultOn:true,  autoCalc:false },
  { key:'fat',    name:'体脂肪率', unit:'%',    icon:'&#128293;', color:'#ff9f43', cls:'c-fat',    bg:'bg-fat',    defaultOn:false, autoCalc:false },
  { key:'muscle', name:'筋肉量',   unit:'kg',   icon:'&#128170;', color:'#4ecca3', cls:'c-muscle', bg:'bg-muscle', defaultOn:false, autoCalc:false },
  { key:'bmi',    name:'BMI',      unit:'',     icon:'&#128202;', color:'#60b4ff', cls:'c-bmi',    bg:'bg-bmi',    defaultOn:false, autoCalc:true  },
  { key:'bmr',    name:'基礎代謝', unit:'kcal', icon:'&#9889;',  color:'#ffd166', cls:'c-bmr',    bg:'bg-bmr',    defaultOn:false, autoCalc:false },
];
const WEEKDAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const BMI_CATS = [
  { max:18.5,    label:'低体重',          color:'#60b4ff' },
  { max:25.0,    label:'普通体重',        color:'#4ecca3' },
  { max:30.0,    label:'肥満(1度)',      color:'#ffd166' },
  { max:35.0,    label:'肥満(2度)',      color:'#ff9f43' },
  { max:Infinity,label:'肥満(3度以上)', color:'#ff6b8a' },
];

// ========================================
// STATE
// ========================================
let settings = {
  height: null,
  gender: '',
  goalWeight: null,
  goalFat: null,
  goalMuscle: null,
  goalBmi: null,
  goalDate: null,
  metrics: { weight:true, fat:false, muscle:false, bmi:false, bmr:false },
  smoothness: 0,
  initialized: false
};
let records = [];
let chartInstances = {};
let chartVisibility = {};
let xRangeDays = 0;
let yAxisMode = 'auto';
let clockInterval = null;
let dateOverride = null;
let editingRecordIdx = null;

// ========================================
// PERSIST
// ========================================
function localDateStr(ts) {
  const d = new Date(ts);
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return yy + '-' + mm + '-' + dd;
}

function load() {
  try { const s = JSON.parse(localStorage.getItem('bml_settings')); if (s) settings = {...settings, ...s}; } catch(e) {}
  try { const r = JSON.parse(localStorage.getItem('bml_records'));   if (r) records  = r; } catch(e) {}
  // Migration: fix dates saved using UTC (toISOString) instead of local timezone.
  // Runs every load but only rewrites records that are actually wrong.
  let migrated = false;
  records.forEach(r => {
    if (!r.ts) return;
    const correct = localDateStr(r.ts);
    if (r.date !== correct) { r.date = correct; migrated = true; }
  });
  if (migrated) localStorage.setItem('bml_records', JSON.stringify(records));
  METRICS.forEach(m => {
    if (chartVisibility[m.key] === undefined) chartVisibility[m.key] = true;
  });
}
function save() {
  localStorage.setItem('bml_settings', JSON.stringify(settings));
  localStorage.setItem('bml_records',  JSON.stringify(records));
}

// ========================================
// NAVIGATION
// ========================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function goSettings() { stopClock(); renderSettings(); showScreen('settings'); }
function goRecord()   { renderRecord(); showScreen('record'); startClock(); }
function goChart()    { renderChart(); showScreen('chart'); stopClock(); }

function saveSettings() {
  const toPos = id => { const v = parseFloat(document.getElementById(id).value); return (v > 0) ? v : null; };
  settings.height     = toPos('s-height');
  settings.gender     = document.getElementById('s-gender').value || '';
  settings.goalWeight = toPos('s-goal-weight');
  settings.goalFat    = toPos('s-goal-fat');
  settings.goalMuscle = toPos('s-goal-muscle');
  settings.goalBmi    = toPos('s-goal-bmi');
  settings.goalDate   = document.getElementById('s-goal-date').value || null;
  settings.initialized = true;
  save();
  goRecord();
  toast('設定を保存しました ✓');
}

// ========================================
// SERVICE WORKER
// ========================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ========================================
// CLOCK
// ========================================
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const el_t = document.getElementById('rec-time');
  const el_d = document.getElementById('rec-date');
  const el_w = document.getElementById('rec-weekday');
  if (el_t) el_t.textContent = h + ':' + m;
  if (el_d) el_d.textContent = now.getFullYear() + '  ' + MONTHS[now.getMonth()] + '  ' + String(now.getDate()).padStart(2, '0');
  if (el_w) el_w.innerHTML = '<span class="live-dot"></span>' + WEEKDAYS[now.getDay()];
}
function startClock() {
  clearInterval(clockInterval);
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
}
function stopClock() { clearInterval(clockInterval); }

// ========================================
// DATE OVERRIDE
// ========================================
function toggleTimeInput() {
  const checked = document.getElementById('override-time-check').checked;
  document.getElementById('override-time-row').style.display = checked ? '' : 'none';
}

function applyDateOverride() {
  const dateVal = document.getElementById('override-date').value;
  if (!dateVal) { toast('日付を選択してください'); return; }
  const timeChk = document.getElementById('override-time-check').checked;
  const timeVal = timeChk ? document.getElementById('override-time').value : '';
  // Build datetime - if no time specified, use start of that day
  const dt = timeVal
    ? new Date(dateVal + 'T' + timeVal + ':00')
    : new Date(dateVal + 'T00:00:00');
  // Reject future datetimes
  // If no time specified, compare only dates
  const now = new Date();
  if (timeVal) {
    if (dt.getTime() > now.getTime()) { toast('未来の日時は指定できません'); return; }
  } else {
    const todayStr = localDateStr(now.getTime());
    if (dateVal > todayStr) { toast('未来の日付は指定できません'); return; }
  }
  const [y, mo, d] = dateVal.split('-');
  const dispTime = timeVal || '00:00';
  const dispText = y + '年' + parseInt(mo) + '月' + parseInt(d) + '日 ' + dispTime;
  dateOverride = { ts: dt.getTime(), date: dateVal, datetime: dt.toLocaleString('ja-JP'), displayText: dispText };
  document.getElementById('date-override-text').textContent = dispText + ' として記録';
  document.getElementById('date-override-bar').style.display = '';
  closeModal('date-modal');
  toast('日付を指定しました');
}

function clearDateOverride() {
  dateOverride = null;
  document.getElementById('date-override-bar').style.display = 'none';
}

// ========================================
// SETTINGS RENDER
// ========================================
function renderSettings() {
  document.getElementById('s-height').value      = settings.height || '';
  document.getElementById('s-gender').value      = settings.gender || '';
  document.getElementById('s-goal-weight').value = settings.goalWeight || '';
  document.getElementById('s-goal-fat').value    = settings.goalFat || '';
  document.getElementById('s-goal-muscle').value = settings.goalMuscle || '';
  document.getElementById('s-goal-bmi').value    = settings.goalBmi || '';
  document.getElementById('s-goal-date').value   = settings.goalDate || '';

  // Goal date min = tomorrow
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('s-goal-date').min = localDateStr(tomorrow.getTime());

  document.getElementById('metric-toggles').innerHTML = METRICS.map(m => `
    <div class="toggle-row">
      <div class="toggle-label">
        <span class="toggle-name">${m.icon} ${m.name}${m.autoCalc ? ' <span style="font-size:10px;color:var(--blue)">(自動計算)</span>' : ''}</span>
        <span class="toggle-desc ${m.cls}">${m.unit || '指数'}</span>
      </div>
      <div class="toggle ${settings.metrics[m.key] ? 'on' : ''}" id="tog-${m.key}" onclick="toggleMetric('${m.key}')"></div>
    </div>`).join('');
}

function toggleMetric(key) {
  settings.metrics[key] = !settings.metrics[key];
  document.getElementById('tog-' + key).classList.toggle('on', settings.metrics[key]);
}

// ========================================
// RECORD RENDER
// ========================================
function renderRecord() {
  // Set default date in modal
  const today = localDateStr(Date.now());
  const di = document.getElementById('override-date');
  if (di && !di.value) di.value = today;
  // Set max date to today to prevent future date selection
  if (di) di.max = today;

  const enabled = METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc);
  document.getElementById('metric-inputs').innerHTML = enabled.map(m => `
    <div class="metric-input-card" id="mic-${m.key}">
      <div class="metric-icon ${m.bg}">${m.icon}</div>
      <div class="metric-input-right">
        <div class="metric-input-name ${m.cls}">${m.name}</div>
        <div class="metric-input-field">
          <input type="number" inputmode="decimal" placeholder="- - -" min="0.1"
            id="inp-${m.key}" oninput="onMetricInput()" style="color:${m.color}">
          <span class="metric-input-unit">${m.unit}</span>
        </div>
      </div>
    </div>`).join('');

  const bmiOn = settings.metrics['bmi'];
  document.getElementById('bmi-auto-display').style.display = bmiOn ? '' : 'none';
  if (bmiOn) updateBmiDisplay();
  renderGoalProgress();
  checkRecordBtn();
}

function onMetricInput() {
  if (settings.metrics['bmi']) updateBmiDisplay();
  checkRecordBtn();
}

function calcBmi(weight) {
  if (!settings.height) return null;
  const w = weight !== undefined ? weight : (() => {
    const el = document.getElementById('inp-weight');
    return el ? parseFloat(el.value) : NaN;
  })();
  if (isNaN(w) || w <= 0) return null;
  const hm = settings.height / 100;
  return Math.round(w / (hm * hm) * 10) / 10;
}

function updateBmiDisplay() {
  const bmi = calcBmi();
  const valEl   = document.getElementById('bmi-auto-val');
  const labelEl = document.getElementById('bmi-auto-label');
  if (!valEl) return;
  if (bmi === null) {
    valEl.textContent = '- - -';
    valEl.style.color = 'var(--text3)';
    labelEl.textContent = settings.height ? '体重を入力すると計算されます' : '設定で身長を登録してください';
    labelEl.style.color = 'var(--text3)';
  } else {
    const cat = BMI_CATS.find(c => bmi < c.max);
    valEl.textContent = bmi;
    valEl.style.color = cat.color;
    labelEl.textContent = cat.label;
    labelEl.style.color = cat.color;
  }
}

function checkRecordBtn() {
  const enabled = METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc);
  const any = enabled.some(m => {
    const el = document.getElementById('inp-' + m.key);
    return el && el.value.trim() !== '';
  });
  document.getElementById('btn-record').disabled = !any;
}

function renderGoalProgress() {
  const gp = document.getElementById('goal-progress');
  const gi = document.getElementById('goal-progress-inner');
  const last = records.length ? [...records].sort((a,b) => b.ts - a.ts)[0] : null;
  if (!last) { gp.style.display = 'none'; return; }
  let html = '';
  if (settings.goalWeight && last.weight) {
    const diff = (last.weight - settings.goalWeight).toFixed(1);
    const prog = Math.max(0, Math.min(100, 100 - Math.abs(diff) * 5));
    html += goalBar('体重', last.weight, settings.goalWeight, diff, prog, 'kg');
  }
  if (settings.goalFat && last.fat) {
    const diff = (last.fat - settings.goalFat).toFixed(1);
    const prog = Math.max(0, Math.min(100, 100 - Math.abs(diff) * 3));
    html += goalBar('体脂肪率', last.fat, settings.goalFat, diff, prog, '%');
  }
  if (html) { gi.innerHTML = html; gp.style.display = ''; }
  else gp.style.display = 'none';
}

function goalBar(name, cur, goal, diff, prog, unit) {
  const sign = diff > 0 ? '+' : '';
  const color = Math.abs(diff) < 1 ? '#4ecca3' : '#a594ff';
  return `
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:12px;color:var(--text2)">${name}</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:${color}">${sign}${diff} ${unit}</span>
      </div>
      <div class="goal-bar-wrap">
        <div class="goal-bar" style="width:${prog}%;background:${color}"></div>
      </div>
      <div class="goal-label">
        <span>現在 ${cur}${unit}</span><span>目標 ${goal}${unit}</span>
      </div>
    </div>`;
}

// ========================================
// SAVE RECORD
// ========================================
function saveRecord() {
  let ts, date, datetime;
  if (dateOverride) {
    ts = dateOverride.ts; date = dateOverride.date; datetime = dateOverride.datetime;
  } else {
    const now = new Date();
    ts = now.getTime();
    date = localDateStr(ts);
    datetime = now.toLocaleString('ja-JP');
  }
  const rec = { ts, date, datetime };
  let hasData = false;
  METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc).forEach(m => {
    const val = parseFloat(document.getElementById('inp-' + m.key)?.value);
    if (!isNaN(val) && val > 0) { rec[m.key] = val; hasData = true; }
  });
  if (!hasData) return;
  if (settings.metrics['bmi']) {
    const bmi = calcBmi();
    if (bmi !== null) rec['bmi'] = bmi;
  }
  records.push(rec);
  save();
  toast('記録しました ✓');
  METRICS.forEach(m => { const el = document.getElementById('inp-' + m.key); if (el) el.value = ''; });
  clearDateOverride();
  checkRecordBtn();
  if (settings.metrics['bmi']) updateBmiDisplay();

  // ── 目標達成チェック ──────────────────────────
  const achieved = checkGoalAchieved(rec);
  if (achieved.length) {
    setTimeout(() => showGoalCelebration(achieved), 700);
  } else {
    setTimeout(() => goChart(), 600);
  }
}

// 目標に到達した項目を返す
// returns array of { metric, goalVal, isEarly }
function checkGoalAchieved(rec) {
  const results = [];
  const goalDate = settings.goalDate ? new Date(settings.goalDate + 'T00:00:00') : null;
  const isEarly = goalDate && new Date(rec.date + 'T00:00:00') < goalDate;

  const checks = [
    { key: 'weight', goal: settings.goalWeight,
      reached: (v, g) => v <= g },   // 体重は以下で達成
    { key: 'fat',    goal: settings.goalFat,
      reached: (v, g) => v <= g },   // 体脂肪率は以下
    { key: 'muscle', goal: settings.goalMuscle,
      reached: (v, g) => v >= g },   // 筋肉量は以上
    { key: 'bmi',    goal: settings.goalBmi,
      // BMI目標達成：目標BMIに近づく方向（目標<現在なら下回る、目標>現在なら上回る）
      reached: (v, g) => Math.abs(v - g) < 0.5 },
  ];

  checks.forEach(({ key, goal, reached }) => {
    if (goal == null) return;
    if (rec[key] == null) return;
    if (!settings.metrics[key]) return;
    if (reached(rec[key], goal)) {
      const m = METRICS.find(m => m.key === key);
      results.push({ metric: m, goalVal: goal, isEarly });
    }
  });
  return results;
}

function showGoalCelebration(achieved) {
  // Build message for each achieved goal
  const messages = achieved.map(({ metric, goalVal, isEarly }) => {
    if (isEarly) {
      return '&#127881; おめでとうございます！\n予定より早く' + metric.name + 'が目標値' + goalVal + metric.unit + 'に到達しました！すごいです！';
    } else {
      return '&#127881; おめでとうございます！\n' + metric.name + 'が目標値' + goalVal + metric.unit + 'に到達しました！';
    }
  });
  messages.push('新しい目標値を設定しましょう！');

  // Reset achieved goal fields in settings
  achieved.forEach(({ metric }) => {
    if (metric.key === 'weight') settings.goalWeight = null;
    if (metric.key === 'fat')    settings.goalFat    = null;
    if (metric.key === 'muscle') settings.goalMuscle = null;
    if (metric.key === 'bmi')    settings.goalBmi    = null;
  });
  // Reset goal date
  settings.goalDate = null;
  save();

  // Show celebration modal
  document.getElementById('celebration-msg').innerHTML =
    messages.map(msg => '<p style="margin-bottom:12px;white-space:pre-line">' + msg + '</p>').join('');
  showModal('celebration-modal');
}

function closeCelebrationGoToSettings() {
  closeModal('celebration-modal');
  goSettings();
}

function buildStatsHtml(enabled) {

      ? `<div class="stat-chip"><div class="stat-chip-val ${m.cls}">${v}${m.unit}</div><div class="stat-chip-label">${m.name}</div></div>`
      : '';

    <div class="card" style="margin-bottom:12px">

      <div class="stats-row">${chips}</div>
    </div>`;
}

// ========================================
// BUILD CHARTS  (unified — settings.smoothness=0: raw data, settings.smoothness≥2: raw+smoothed)
// ========================================
function buildCharts() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartInstances = {};
  const enabled = METRICS.filter(m => settings.metrics[m.key]);
  const sorted  = [...records].sort((a,b) => a.ts - b.ts);
  const data    = filterByRange(sorted);

  // Daily aggregation (always needed for smoothing; also cleaner for raw display)
  const dailyMap = {};
  data.forEach(r => {
    if (!dailyMap[r.date]) dailyMap[r.date] = {};
    METRICS.forEach(m => {
      if (r[m.key] != null) {
        if (!dailyMap[r.date][m.key]) dailyMap[r.date][m.key] = [];
        dailyMap[r.date][m.key].push(r[m.key]);
      }
    });
  });
  const days = Object.keys(dailyMap).sort();
  const dailyData = days.map(date => {
    const entry = { date, ts: new Date(date + 'T00:00:00').getTime() };
    METRICS.forEach(m => {
      const arr = dailyMap[date][m.key];
      entry[m.key] = arr ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*100)/100 : null;
    });
    return entry;
  });

  function movingAvg(arr, n) {
    return arr.map((_,i) => {
      const win = arr.slice(Math.max(0, i-n+1), i+1).filter(v => v != null);
      return win.length ? Math.round(win.reduce((a,b)=>a+b,0)/win.length*100)/100 : null;
    });
  }

  const baseLabels = dailyData.map(d => {
    const [,mo,da] = d.date.split('-');
    return parseInt(mo)+'/'+parseInt(da);
  });

  enabled.forEach(m => {
    const canvas = document.getElementById('chart-' + m.key);
    if (!canvas || !chartVisibility[m.key]) return;

    const rawVals = dailyData.map(d => d[m.key]);

    const { datasets: goalDatasets, extraLabels } = buildGoalDatasets(m, dailyData, baseLabels);
    const allLabels  = [...baseLabels, ...extraLabels];
    const paddedRaw  = [...rawVals, ...extraLabels.map(()=>null)];
    goalDatasets.forEach(ds => { while (ds.data.length < allLabels.length) ds.data.push(null); });

    let datasets;
    if (settings.smoothness === 0) {
      // Raw data only
      datasets = [
        {
          label: m.name,
          data: paddedRaw,
          borderColor: m.color,
          backgroundColor: m.color + '22',
          borderWidth: 2,
          pointRadius: dailyData.length > 60 ? 0 : 4,
          pointBackgroundColor: m.color,
          pointBorderColor: '#0a0a0f',
          pointBorderWidth: 2,
          tension: 0.3,
          fill: true,
          spanGaps: true,
          order: 1
        },
        ...goalDatasets
      ];
    } else {
      // Raw (faint) + smoothed line
      const maVals   = movingAvg(rawVals, settings.smoothness);
      const paddedMA = [...maVals, ...extraLabels.map(()=>null)];
      datasets = [
        {
          label: m.name + ' (日次)',
          data: paddedRaw,
          borderColor: m.color + '44',
          backgroundColor: 'transparent',
          borderWidth: 1,
          pointRadius: dailyData.length > 60 ? 0 : 2,
          pointBackgroundColor: m.color + '66',
          tension: 0.2,
          spanGaps: true,
          borderDash: [3,4],
          order: 2
        },
        {
          label: m.name + ' (滑らか)',
          data: paddedMA,
          borderColor: m.color,
          backgroundColor: m.color + '22',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.4,
          fill: true,
          spanGaps: true,
          order: 1
        },
        ...goalDatasets
      ];
    }

    chartInstances[m.key] = new Chart(canvas, {
      type: 'line',
      data: { labels: allLabels, datasets },
      options: buildChartOptions(m)
    });
  });
}

function filterByRange(data) {
  if (xRangeDays === 0) return data;
  // Use start-of-today minus (xRangeDays-1) days so today is always fully included
  const today = new Date(); today.setHours(0,0,0,0);
  const cutoff = today.getTime() - (xRangeDays - 1) * 86400000;
  return data.filter(r => r.ts >= cutoff);
}

// ========================================
// GOAL LINE DATASETS
// Returns { datasets, extraLabels }
// extraLabels: additional x-axis labels to append (e.g. goal date)
// ========================================
function buildGoalDatasets(m, data, baseLabels) {
  const datasets = [];
  const extraLabels = [];

  // Determine goal value for this metric
  let goalVal = null;
  if      (m.key === 'weight') goalVal = settings.goalWeight;
  else if (m.key === 'fat')    goalVal = settings.goalFat;
  else if (m.key === 'muscle') goalVal = settings.goalMuscle;
  else if (m.key === 'bmi')    goalVal = settings.goalBmi;

  const baseLen = baseLabels.length;

  // ── 1. Horizontal goal value line ──────────────────────────────
  if (goalVal != null) {
    datasets.push({
      label: '目標値 ' + goalVal + m.unit,
      data: Array(baseLen).fill(goalVal),
      borderColor: m.color + '70',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [5, 6],
      pointRadius: 0,
      tension: 0,
      fill: false,
      spanGaps: true,
      order: 10
    });
  }

  return { datasets, extraLabels };
}

// ========================================
// CHART OPTIONS
// ========================================
function buildChartOptions(m) {
  let goalVal = null;
  if      (m.key === 'weight') goalVal = settings.goalWeight;
  else if (m.key === 'fat')    goalVal = settings.goalFat;
  else if (m.key === 'muscle') goalVal = settings.goalMuscle;
  else if (m.key === 'bmi')    goalVal = settings.goalBmi;

  // BMI-derived goal weight for weight chart
  let bmiGoalWeight = null;
  if (m.key === 'weight' && settings.goalBmi && settings.height) {
    const hm = settings.height / 100;
    bmiGoalWeight = Math.round(settings.goalBmi * hm * hm * 10) / 10;
  }

  // Tick formatter: muscle shows 1 decimal place always
  const tickCb = m.key === 'muscle'
    ? v => v.toFixed(1) + m.unit
    : v => v + m.unit;

  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 500 },
    interaction: { intersect: false, mode: 'index' },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1a24',
        borderColor: '#3a3a50',
        borderWidth: 1,
        titleColor: '#9090a8',
        bodyColor: '#e8e8f0',
        padding: 10,
        filter: item => item.parsed.y !== null,
        callbacks: {
          label: ctx => {
            if (ctx.parsed.y === null) return null;
            return ctx.dataset.label + ': ' + ctx.parsed.y + m.unit;
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color: '#2a2a3a' },
        ticks: { color: '#5a5a72', font: { family: 'DM Mono', size: 10 }, maxTicksLimit: 8 }
      },
      y: {
        grid: { color: '#2a2a3a' },
        min: yAxisMode === 'zero' ? 0 : undefined,
        ticks: {
          color: '#5a5a72',
          font: { family: 'DM Mono', size: 10 },
          callback: tickCb
        },
        afterDataLimits: yAxisMode !== 'zero' ? (scale => {
          // Expand Y range to include goal values and BMI-derived values
          const candidates = [goalVal, bmiGoalWeight].filter(v => v != null);
          candidates.forEach(v => {
            if (v < scale.min) scale.min = v - 0.5;
            if (v > scale.max) scale.max = v + 0.5;
          });
        }) : undefined
      }
    }
  };
}

// ========================================
// CHART CONTROLS
// ========================================
const SMOOTH_STEPS = [0, 2, 4, 6, 8, 10, 12, 14];

function onSmoothnessChange(idx) {
  settings.smoothness = SMOOTH_STEPS[parseInt(idx)];
  save();
  buildCharts();
}

function setXRange(val) {
  xRangeDays = val;
  document.querySelectorAll('.seg-btn').forEach(b => {
    const match = b.getAttribute('onclick')?.match(/^setXRange\((\d+)\)$/);
    if (match) b.classList.toggle('active', parseInt(match[1]) === val);
  });
  buildCharts();
}

function setYMode(mode) {
  yAxisMode = mode;
  document.querySelectorAll('.seg-btn').forEach(b => {
    const match = b.getAttribute('onclick')?.match(/^setYMode\('(\w+)'\)$/);
    if (match) b.classList.toggle('active', match[1] === mode);
  });
  buildCharts();
}

function toggleChartVisibility(key) {
  chartVisibility[key] = !chartVisibility[key];
  document.getElementById('cv-' + key)?.classList.toggle('on', chartVisibility[key]);
  const card = document.getElementById('chart-card-' + key);
  if (card) card.style.display = chartVisibility[key] ? '' : 'none';
  if (chartVisibility[key]) {
    buildCharts();
  } else {
    if (chartInstances[key]) { chartInstances[key].destroy(); delete chartInstances[key]; }
  }
}

// ========================================
// DATA LIST — view / edit / delete
// ========================================
function openDataList() {
  const sorted = [...records].map((r, i) => ({ r, i })).sort((a, b) => b.r.ts - a.r.ts);
  const enabled = METRICS.filter(m => settings.metrics[m.key]);

  if (!sorted.length) {
    document.getElementById('datalist-inner').innerHTML =
      '<div class="empty-state"><div class="empty-state-icon">&#128269;</div><div class="empty-state-text">記録がありません</div></div>';
  } else {
    document.getElementById('datalist-inner').innerHTML = sorted.map(({ r, i }) => {
      const chips = enabled.filter(m => r[m.key] != null)
        .map(m => `<span class="data-list-val-chip ${m.cls}">${m.name} ${r[m.key]}${m.unit}</span>`)
        .join('');
      const dateStr = r.datetime || r.date;
      return `<div class="data-list-item">
        <div class="data-list-meta">
          <div class="data-list-date">${dateStr}</div>
          <div class="data-list-vals">${chips || '<span style="color:var(--text3);font-size:12px">データなし</span>'}</div>
        </div>
        <div class="data-list-actions">
          <button class="data-edit-btn" onclick="openEditRecord(${i})">修正</button>
          <button class="data-del-btn" onclick="deleteRecord(${i})">削除</button>
        </div>
      </div>`;
    }).join('');
  }
  showModal('datalist-modal');
}

let pendingDeleteIdx = null;

function deleteRecord(idx) {
  pendingDeleteIdx = idx;
  showModal('delete-confirm-modal');
}

function confirmDeleteRecord() {
  closeModal('delete-confirm-modal');
  if (pendingDeleteIdx === null) return;
  records.splice(pendingDeleteIdx, 1);
  pendingDeleteIdx = null;
  save();
  toast('記録を削除しました');
  openDataList();
  renderChart();
}

function openEditRecord(idx) {
  editingRecordIdx = idx;
  const r = records[idx];
  const enabled = METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc);
  const dateStr = r.datetime || r.date;
  const fields = enabled.map(m => `
    <div class="edit-field-row">
      <span class="edit-field-label ${m.cls}">${m.name}${m.unit ? ' ('+m.unit+')' : ''}</span>
      <input class="edit-input" type="number" inputmode="decimal" min="0.1"
        id="edit-inp-${m.key}" value="${r[m.key] ?? ''}" placeholder="未入力">
    </div>`).join('');
  document.getElementById('edit-modal-inner').innerHTML =
    `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:14px;background:var(--bg3);padding:8px 12px;border-radius:8px">&#128197; ${dateStr}</div>` +
    fields;
  closeModal('datalist-modal');
  showModal('edit-modal');
}

function saveEditRecord() {
  if (editingRecordIdx === null) return;
  const r = records[editingRecordIdx];
  const enabled = METRICS.filter(m => settings.metrics[m.key] && !m.autoCalc);
  enabled.forEach(m => {
    const el = document.getElementById('edit-inp-' + m.key);
    if (!el) return;
    const val = parseFloat(el.value);
    r[m.key] = (isNaN(val) || val <= 0) ? null : val;
  });
  // Recalculate BMI if weight was edited
  if (settings.metrics['bmi'] && r.weight != null) {
    const bmi = calcBmi(r.weight);
    r.bmi = bmi !== null ? bmi : null;
  }
  save();
  toast('記録を修正しました ✓');
  editingRecordIdx = null;
  closeModal('edit-modal');
  openDataList();
  renderChart();
}

// ========================================
// EXPORT
// ========================================
function getVisibleMetrics() {
  return METRICS.filter(m => settings.metrics[m.key] && chartVisibility[m.key]);
}

function exportCSV() {
  closeModal('export-modal');
  const vis = getVisibleMetrics();
  if (!vis.length) { toast('出力するデータがありません'); return; }
  const versionRow = '#BodyMassLog v' + APP_VERSION;
  const headers = ['日時', '日付', ...vis.map(m => m.name + '(' + (m.unit || '-') + ')')];
  const rows = [...records].sort((a,b) => a.ts - b.ts).map(r => [
    r.datetime || r.date, r.date, ...vis.map(m => r[m.key] ?? '')
  ]);
  const csv = [versionRow, headers, ...rows].map(r => Array.isArray(r) ? r.join(',') : r).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'BodyMassLog.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSVをダウンロードしました ✓');
}

function exportClipboard() {
  closeModal('export-modal');
  const vis = getVisibleMetrics();
  if (!vis.length) { toast('出力するデータがありません'); return; }
  const sorted = [...records].sort((a,b) => a.ts - b.ts);

  let text = '【BodyMassLog 記録データ】\n';
  text += '出力日: ' + new Date().toLocaleDateString('ja-JP') + '\n\n';

  text += '【プロフィール】\n';
  if (settings.height) text += '身長: ' + settings.height + 'cm\n';
  if (settings.gender) text += '性別: ' + (settings.gender === 'male' ? '男性' : '女性') + '\n';

  text += '\n【目標値】\n';
  if (settings.goalWeight) text += '目標体重: ' + settings.goalWeight + 'kg\n';
  if (settings.goalFat)    text += '目標体脂肪率: ' + settings.goalFat + '%\n';
  if (settings.goalMuscle) text += '目標筋肉量: ' + settings.goalMuscle + 'kg\n';
  if (settings.goalBmi)    text += '目標BMI: ' + settings.goalBmi + '\n';
  if (settings.goalDate)   text += '目標達成日: ' + settings.goalDate + '\n';
  if (!settings.goalWeight && !settings.goalFat && !settings.goalMuscle && !settings.goalBmi) {
    text += '（未設定）\n';
  }

  text += '\n【記録データ概要】\n';
  text += '記録期間: ' + (sorted[0]?.date || '-') + ' 〜 ' + (sorted[sorted.length-1]?.date || '-') + '\n';
  text += '記録件数: ' + sorted.length + '件\n';

  text += '\n【時系列データ】\n';
  sorted.forEach(r => {
    const line = vis.map(m => r[m.key] != null ? m.name + ':' + r[m.key] + m.unit : null).filter(Boolean).join(', ');
    if (line) text += (r.datetime || r.date) + ' - ' + line + '\n';
  });

  text += '\n以上のデータを分析し、目標達成に向けた傾向や改善点を教えてください。';

  navigator.clipboard.writeText(text).then(() => {
    toast('クリップボードにコピーしました ✓');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('クリップボードにコピーしました ✓');
  });
}

function clearAllData() {
  records = [];
  save();
  closeModal('clear-modal');
  toast('全データを削除しました');
  renderChart();
}

// ========================================
// IMPORT CSV
// ========================================
function triggerImportCSV() {
  document.getElementById('csv-file-input').value = '';
  document.getElementById('csv-file-input').click();
}

function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  closeModal('datalist-modal');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result.replace(/^\uFEFF/, '');
      const allLines = text.split(/\r?\n/).filter(l => l.trim() !== '');
      if (allLines.length < 2) { showImportError('データが見つかりませんでした'); return; }

      // Check version comment line
      let lines = allLines;
      if (allLines[0].startsWith('#BodyMassLog')) {
        const csvVersion = allLines[0].replace('#BodyMassLog v', '').trim();
        if (csvVersion !== APP_VERSION) {
          const proceed = window.__importProceed; // set by version warning modal ok
          if (!proceed) {
            pendingImportText = text;
            document.getElementById('import-version-msg').textContent =
              'このCSVはv' + csvVersion + 'で作成されています（現在のアプリはv' + APP_VERSION + '）。正しく取り込めない可能性がありますが、続けますか？';
            showModal('import-version-modal');
            return;
          }
          window.__importProceed = false;
        }
        lines = allLines.slice(1); // skip version row
      }

      if (lines.length < 2) { showImportError('データが見つかりませんでした'); return; }

      const headers = lines[0].split(',').map(h => h.trim());
      // Validate: must have 日時 and 日付 columns
      if (headers[0] !== '日時' || headers[1] !== '日付') {
        showImportError('CSVの形式が正しくありません。\nBodyMassLogからエクスポートしたCSVを使用してください。');
        return;
      }

      const colMap = {};
      headers.forEach((h, i) => {
        if (i === 0) { colMap['datetime'] = i; return; }
        if (i === 1) { colMap['date'] = i; return; }
        METRICS.forEach(m => {
          const expected = m.name + '(' + (m.unit || '-') + ')';
          if (h === expected || h === m.name) colMap[m.key] = i;
        });
      });

      // Must have at least one metric column
      const hasMetric = METRICS.some(m => colMap[m.key] !== undefined);
      if (!hasMetric) {
        showImportError('CSVの形式が正しくありません。\n記録データの列が見つかりませんでした。');
        return;
      }

      let added = 0, skipped = 0, errors = 0;
      const existingTs = new Set(records.map(r => r.ts));

      lines.slice(1).forEach((line, lineIdx) => {
        const cols = line.split(',');
        if (cols.length < 2) { errors++; return; }
        const dateStr = cols[colMap['date']]?.trim();
        if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) { errors++; return; }

        let ts;
        const dtStr = colMap['datetime'] !== undefined ? cols[colMap['datetime']]?.trim() : '';
        if (dtStr) {
          const parsed = new Date(dtStr.replace(/\//g, '-'));
          ts = isNaN(parsed.getTime()) ? new Date(dateStr + 'T00:00:00').getTime() : parsed.getTime();
        } else {
          ts = new Date(dateStr + 'T00:00:00').getTime();
        }
        if (isNaN(ts)) { errors++; return; }
        if (existingTs.has(ts)) { skipped++; return; }

        const rec = { ts, date: dateStr, datetime: dtStr || dateStr };
        METRICS.forEach(m => {
          if (colMap[m.key] !== undefined) {
            const val = parseFloat(cols[colMap[m.key]]);
            if (!isNaN(val) && val > 0) rec[m.key] = val;
          }
        });
        const hasVal = METRICS.some(m => rec[m.key] != null);
        if (!hasVal) { skipped++; return; }

        records.push(rec);
        existingTs.add(ts);
        added++;
      });

      if (added === 0 && errors > 0) {
        showImportError('CSVの形式が正しくありません。\n有効なデータ行が見つかりませんでした。');
        return;
      }

      records.sort((a, b) => a.ts - b.ts);
      save();
      const msg = added + '件を取り込みました' + (skipped > 0 ? '（' + skipped + '件スキップ）' : '') + ' ✓';
      toast(msg);
      renderChart();
    } catch(err) {
      showImportError('CSVの読み込みに失敗しました。\nファイルが破損しているか、形式が正しくありません。');
      console.error(err);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

let pendingImportText = null;

function showImportError(msg) {
  document.getElementById('import-error-msg').textContent = msg;
  showModal('import-error-modal');
}

function proceedImportAfterVersionWarning() {
  closeModal('import-version-modal');
  window.__importProceed = true;
  if (!pendingImportText) return;
  const fakeFile = new File([pendingImportText], 'import.csv', {type:'text/csv'});
  pendingImportText = null;
  importCSV({ files: [fakeFile] });
}

// ========================================
// MODAL / TOAST
// ========================================
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('show');
  });
});

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ========================================
// INIT
// ========================================
load();
// Set version label in all topbars from APP_VERSION constant
['ver-settings','ver-record','ver-chart'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = 'v' + APP_VERSION;
});
if (!settings.initialized) { renderSettings(); showScreen('settings'); }
else goRecord();
</script>
